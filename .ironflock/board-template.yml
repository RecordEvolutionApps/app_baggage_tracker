name: VisionAI
layout:
  gridLayout:
    - x: 0
      y: 0
      w: 12
      h: 48
      id: 6c7855ab-d64e-4738-8315-964cc34e5b3f
      z: 1001
      fixedWidth: true
    - x: 12
      y: 0
      w: 16
      h: 20
      id: "13"
      z: 1001
    - x: 12
      y: 20
      w: 36
      h: 28
      id: "12"
      z: 1002
    - id: fc6e0783-f039-4796-9ad7-9f124140747d
      x: 28
      y: 0
      w: 20
      h: 20
      z: 1003
    - id: 8230a69a-146b-4c2f-9b49-7199973d8bb8
      x: 28
      y: 0
      w: 5
      h: 3
      z: 1004
  subRoutes:
    "*":
      gridLayout:
        - x: 12
          y: 0
          w: 36
          h: 48
          id: 2a14ba2f-568c-43f2-a5bb-123277502f79
          z: 1000
        - x: 0
          y: 0
          w: 12
          h: 48
          id: 6c7855ab-d64e-4738-8315-964cc34e5b3f
          z: 1001
          fixedWidth: true
        - x: 0
          y: 0
          w: 12
          h: 4
          id: a176e5b9-eeeb-4173-b2f7-91a319edc8ef
          z: 1002
          fixedWidth: true
          fixedHeight: true
    streams:
      gridLayout:
        - id: 4655059f-b895-4e5a-a382-2f64a8175d1a
          x: 0
          y: 0
          w: 48
          h: 48
          z: 1000
        - id: 70b1d05b-91e4-4625-92c0-c44becdb4008
          x: 0
          y: 0
          w: 5
          h: 3
          z: 1001
background_color: "#ffc77e"
text_color: "#575062"
style:
  theme:
    theme_name: infographic
  background_color: "#0000"
  text_color: "#27727b"
  tile_background_color: "#0000"
  tile_border_color: "#cccccc54"
  overflow: false
widgets:
  - package_name: widget-linechart
    chartconfig:
      settings:
        timeseries: $bool:true
        xAxisLabel: $str:Time
        yAxisLabel: $str:Count
      dataseries:
        - label: $str:Count
          chartName: "$str:"
          type: $str:bar
          data:
            tableRef:
              tablename: linecount_agg
              format:
                x: period
                y: num_out
                pivot: linename
              queryParams:
                limit: 100
              swarm_app_databackend_key: 423
          backgroundColor: ""
          borderColor: ""
          styling: {}
          advanced: {}
      title: $str:Line Crossings
      subTitle: null
      axis: {}
    custom_style: null
    version: 1.6.31
    layout_id: "12"
  - package_name: widget-value
    chartconfig:
      dataseries:
        - label: $str:Total
          unit: "$str:"
          precision: $num:0
          advanced:
            averageLatest: $num:1
          styling: {}
          value:
            valueRef:
              tablename: linecount_agg
              column: num_out_dev
              swarm_app_databackend_key: 423
          multiChart: null
      title: $str:Total Line Crossings
      subTitle: $str:Accross all camera streams
    custom_style: null
    version: 1.1.25
    layout_id: "13"
  - package_name: widget-embed
    chartconfig:
      webUrl:
        valueRef:
          swarm_app_databackend_key: 423
          tablename: camera_hubs
          column: webpage
          queryParams:
            filterAnd:
              - column: devname
                operator: =
                value: "1"
                dataType: string
                useRoute: true
                useFilter: false
            limit: 1
      title: null
      multiEmbed: null
    custom_style: null
    version: 1.0.7
    layout_id: 2a14ba2f-568c-43f2-a5bb-123277502f79
  - package_name: widget-embed
    chartconfig:
      multiEmbed: $bool:true
      gap: $num:4
      data:
        tableRef:
          swarm_app_databackend_key: 423
          tablename: streams
          queryParams:
            limit: 100
            filterAnd:
              - column: deleted
                operator: =
                value: "false"
                dataType: boolean
              - column: latest_flag
                operator: =
                value: "true"
                dataType: boolean
          format:
            url: stream_url
            title: stream_name
    custom_style:
      tile_border_color: "#fff0"
    version: 1.0.7
    layout_id: 4655059f-b895-4e5a-a382-2f64a8175d1a
  - package_name: widget-sidenav
    chartconfig:
      title: $str:Camera Hubs
      style:
        fontSize: $num:16
        fontWeight: $num:400
      navItems:
        tableRef:
          swarm_app_databackend_key: 423
          tablename: camera_hubs
          queryParams:
            limit: 500
            filterAnd:
              - column: deleted
                operator: =
                value: "false"
                dataType: boolean
              - column: latest_flag
                operator: =
                value: "true"
                dataType: boolean
          format:
            label: devname
            iconName: $str:hub
            route: devname
            leadingSlash: $bool:true
            trailingSlash: null
      route: $str:/
      leadingSlash: null
      trailingSlash: null
    custom_style: null
    version: 1.0.13
    layout_id: 6c7855ab-d64e-4738-8315-964cc34e5b3f
  - package_name: widget-navbutton
    chartconfig:
      title: $str:Home
      iconName: $str:zoom_in_map
      route: $str:/
      style:
        fontSize: $num:16
      leadingSlash: null
      trailingSlash: null
    custom_style: null
    version: 1.0.7
    layout_id: 70b1d05b-91e4-4625-92c0-c44becdb4008
  - package_name: widget-navbutton
    chartconfig:
      title: $str:Full Screen
      iconName: $str:zoom_out_map
      route: $str:/streams
      style:
        fontSize: $num:16
      leadingSlash: null
      trailingSlash: null
    custom_style: null
    version: 1.0.7
    layout_id: 8230a69a-146b-4c2f-9b49-7199973d8bb8
  - package_name: widget-embed
    chartconfig:
      multiEmbed: $bool:true
      gap: $num:4
      data:
        tableRef:
          swarm_app_databackend_key: 423
          tablename: streams
          queryParams:
            limit: 100
            filterAnd:
              - column: deleted
                operator: =
                value: "false"
                dataType: boolean
              - column: latest_flag
                operator: =
                value: "true"
                dataType: boolean
          format:
            url: stream_url
            title: stream_name
    custom_style:
      tile_border_color: "#fff0"
    version: 1.0.7
    layout_id: fc6e0783-f039-4796-9ad7-9f124140747d
